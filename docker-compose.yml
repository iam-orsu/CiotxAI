services:
  postgres:
    image: postgres:16-alpine
    container_name: ciotx-db
    environment:
      POSTGRES_USER: ciotx
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ciotx
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ciotx"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ciotx-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ciotx-api
    environment:
      DATABASE_URL: postgresql+asyncpg://ciotx:${DB_PASSWORD}@postgres:5432/ciotx
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      SECRET_KEY: ${SECRET_KEY}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8000}
      DASHBOARD_URL: ${DASHBOARD_URL:-http://localhost:3000}
      DEV_MODE: ${DEV_MODE:-true}
      DEV_AUTO_PLAN: ${DEV_AUTO_PLAN:-pro}
      # LLM Providers — set any, system auto-detects
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CUSTOM_API_KEY: ${CUSTOM_API_KEY:-}
      CUSTOM_BASE_URL: ${CUSTOM_BASE_URL:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-auto}
      LLM_FALLBACK: ${LLM_FALLBACK:-}
      # GitHub App
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GITHUB_APP_ID: ${GITHUB_APP_ID:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      GITHUB_PRIVATE_KEY_PATH: ${GITHUB_PRIVATE_KEY_PATH:-}
      # Billing
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_WEBHOOK_SECRET: ${RAZORPAY_WEBHOOK_SECRET:-}
      # Internal
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  worker:
    build:
      context: ./api
      dockerfile: Dockerfile.worker
    container_name: ciotx-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://ciotx:${DB_PASSWORD}@postgres:5432/ciotx
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      SECRET_KEY: ${SECRET_KEY}
      DEV_MODE: ${DEV_MODE:-true}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CUSTOM_API_KEY: ${CUSTOM_API_KEY:-}
      CUSTOM_BASE_URL: ${CUSTOM_BASE_URL:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-auto}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: ciotx-dashboard
    environment:
      NEXT_PUBLIC_API_URL: ${API_BASE_URL:-http://localhost:8000}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      - api
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
